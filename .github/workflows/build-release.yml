name: Build e atualiza release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Checar tamanho do CLAUDE.md (guard C5 — ver docs/claude/Manutencao-CLAUDE-md.md)
        run: npm run check:claude-md

      - name: Build
        run: npm run build

      - name: Copiar dist/ para release/ (preserva scripts locais + Motor Python)
        run: |
          # Salva os artefatos de distribuição local (não vêm do build do Vite):
          # scripts de inicialização, o servidor COOP/COEP, o sidecar do Motor
          # Python e toda a pasta release/python/ (instalador, requirements, sonda,
          # wheels de contingência).
          rm -rf /tmp/release-keep
          mkdir -p /tmp/release-keep
          for f in iniciar.bat serve.py sidecar.py; do
            if [ -f "release/$f" ]; then
              cp "release/$f" "/tmp/release-keep/$f"
            fi
          done
          if [ -d "release/python" ]; then
            cp -r "release/python" "/tmp/release-keep/python"
          fi

          # ── CONTINGÊNCIA (P1) — wheels offline do Motor Python ──────────────
          # A sonda HP (09/07/2026) confirmou que os 4 pacotes instalam do índice
          # na máquina alvo, então este passo fica DOCUMENTADO E DESATIVADO. Ative
          # (descomente) SÓ se outra máquina reportar falha real de instalação pelo
          # índice — ele baixa as wheels para embarcar em release/python/wheels/:
          #
          #   python -m pip download -r release/python/requirements.txt \
          #     -d /tmp/release-keep/python/wheels
          #
          # (idealmente numa máquina do MESMO SO/arquitetura/versão de Python da
          # máquina alvo — ver release/python/wheels/LEIAME.txt).

          # Limpa e recria release/ com o conteúdo do build
          rm -rf release/*
          cp -r dist/. release/

          # Restaura os artefatos de distribuição local
          for f in iniciar.bat serve.py sidecar.py; do
            if [ -f "/tmp/release-keep/$f" ]; then
              cp "/tmp/release-keep/$f" "release/$f"
            fi
          done
          if [ -d "/tmp/release-keep/python" ]; then
            cp -r "/tmp/release-keep/python" "release/python"
          fi

      - name: Commit e push da release/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add release/

          # Só commita se houver mudanças
          if git diff --cached --quiet; then
            echo "Nenhuma mudança na release/, pulando commit."
          else
            git commit -m "chore: atualiza build local [skip ci]"

            # main pode ter avançado enquanto o build rodava (PRs em sequência).
            # Tenta rebasear e empurrar de novo até conseguir (race de fast-forward).
            for i in 1 2 3 4 5; do
              if git push origin main; then
                echo "Push concluído na tentativa $i."
                break
              fi
              echo "Push rejeitado (tentativa $i). Rebaseando sobre origin/main..."
              git pull --rebase origin main
              if [ "$i" = "5" ]; then
                echo "Falha ao empurrar release/ após 5 tentativas."
                exit 1
              fi
            done
          fi

      - name: Empacotar release/ em ZIP
        run: |
          BUILD_NUM=$(git rev-list --count HEAD)
          cd release
          zip -r ../AppCreditoSimulador-local.zip .
          echo "BUILD_NUM=${BUILD_NUM}" >> $GITHUB_ENV

      - name: Publicar GitHub Release (latest)
        run: |
          # Remove release e tag existentes (remota E local) para recriar sempre no
          # mesmo link. Deletar só a remota deixava a tag local vinda do checkout
          # (fetch-depth: 0) órfã, e o `gh release create` recusava com
          # "tag latest exists locally but has not been pushed" — causa do padrão
          # de falha alternada a cada push.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git tag -d latest 2>/dev/null || true

          COMMIT_SHORT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%d/%m/%Y %H:%M UTC')

          # --target ancora a tag no commit atual (HEAD já é o commit da release),
          # tornando a criação independente de qualquer tag local remanescente.
          gh release create latest \
            --target "$(git rev-parse HEAD)" \
            --title "Build #${BUILD_NUM} · ${BUILD_DATE}" \
            --notes "## AppCreditoSimulador — distribuição local

          **Build:** #${BUILD_NUM}
          **Commit:** \`${COMMIT_SHORT}\`
          **Data:** ${BUILD_DATE}

          ### Como usar
          1. Baixe o arquivo \`AppCreditoSimulador-local.zip\` abaixo
          2. Extraia em qualquer pasta
          3. Execute \`iniciar.bat\` (requer Python instalado)
          4. O app abre automaticamente no navegador em http://localhost:8080" \
            --latest \
            AppCreditoSimulador-local.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
