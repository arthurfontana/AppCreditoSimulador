name: Sincroniza Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clonar repositório do Wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Copiar arquivos para o Wiki
        run: |
          cp -r docs/wiki/. wiki-repo/

      - name: Commitar e publicar
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Nenhuma alteração no Wiki."
          else
            git commit -m "docs: sync wiki [skip ci]"
            git push
          fi
