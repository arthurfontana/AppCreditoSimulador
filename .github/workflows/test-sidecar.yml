name: Testes do Motor Python (sidecar)

# Job SEPARADO e OPCIONAL (Execução Híbrida H5): valida o protocolo do sidecar
# (release/sidecar.py) com o pytest de tests_python/. Roda só quando os arquivos do
# sidecar mudam (ou sob acionamento manual) e NÃO bloqueia o build da release — é uma
# rede de segurança do protocolo, não um gate do deploy.
on:
  workflow_dispatch:
  push:
    paths:
      - 'release/sidecar.py'
      - 'release/serve.py'
      - 'tests_python/**'
      - '.github/workflows/test-sidecar.yml'
  pull_request:
    paths:
      - 'release/sidecar.py'
      - 'release/serve.py'
      - 'tests_python/**'

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar pytest (o sidecar em si é stdlib puro)
        run: python -m pip install -r tests_python/requirements-dev.txt

      # Sem numpy/scipy instalados: os testes de tier manipulam o estado do warm-up,
      # então o GATE roda idêntico com ou sem os pacotes científicos.
      - name: Rodar pytest
        run: python -m pytest tests_python/ -q
