name: Testes do Motor Python (sidecar)

# Job SEPARADO e OPCIONAL (Execução Híbrida H5): valida o protocolo do sidecar
# (release/sidecar.py) com o pytest de tests_python/. Roda só quando os arquivos do
# sidecar mudam (ou sob acionamento manual) e NÃO bloqueia o build da release — é uma
# rede de segurança do protocolo, não um gate do deploy.
on:
  workflow_dispatch:
  push:
    paths:
      - 'release/sidecar.py'
      - 'release/serve.py'
      - 'release/python/motor_segmentos.py'
      - 'release/python/motor_clusters.py'
      - 'tests_python/**'
      - 'tests/fixtures/golden/**'
      - '.github/workflows/test-sidecar.yml'
  pull_request:
    paths:
      - 'release/sidecar.py'
      - 'release/serve.py'
      - 'release/python/motor_segmentos.py'
      - 'release/python/motor_clusters.py'
      - 'tests_python/**'
      - 'tests/fixtures/golden/**'

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar pytest + numpy (o sidecar é stdlib; o GATE H7 exige numpy)
        run: python -m pip install -r tests_python/requirements-dev.txt

      # Os testes de tier continuam manipulando o estado do warm-up (independem dos
      # pacotes reais). O numpy entra pelos GATEs cross-runtime (DEC-HX-005): a
      # Descoberta profunda (H7, tests_python/test_segment_discovery.py) e a
      # Clusterização (H8, tests_python/test_cluster_segments.py) rodam as fixtures
      # douradas de tests/fixtures/golden/ no motor Python exigindo igualdade número
      # a número — sem numpy os testes de paridade seriam pulados (importorskip) e o
      # GATE não estaria de fato provado. sklearn NÃO é instalado de propósito: é
      # extra por pacote (DEC-HX-004), nunca gate — os testes dos extras da H8 são
      # pulados aqui e o teste de degradação declarada roda mesmo assim.
      - name: Rodar pytest
        run: python -m pytest tests_python/ -q
